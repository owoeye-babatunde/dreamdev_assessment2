apiVersion: moniepoint.com/v1b1

# Notes REST API — Node.js / Express (embedded, in-memory store)
#
# Endpoints:
#   GET  /healthz              → { status: "ok" }
#   GET  /ready                → { status: "ready" }
#   GET  /notes                → { data: [...], total: N }
#   POST /notes                → { data: { id, title, body, createdAt } }   body: { title, body? }
#   GET  /notes/:id            → { data: { id, title, body, createdAt } }
#   DEL  /notes/:id            → 204
#   GET  /metrics (port 9090)  → Prometheus plain-text request counter

metadata:
  name: notes-api
  annotations:
    eshu.moniepoint.com/spec-role: base
    eshu.moniepoint.com/team-name: platform
    eshu.moniepoint.com/department-name: engineering

containers:
  app:
    image: node:20-alpine

    command:
      - sh

    args:
      - -c
      - cd /app && npm install --quiet && node server.js

    variables:
      NODE_ENV: production
      PORT: "3000"
      METRICS_PORT: "9090"
      SERVICE_NAME: ${metadata.name}

    files:
      /app/package.json:
        mode: "0644"
        noExpand: true
        content: |
          {
            "name": "notes-api-temp-temp",
            "version": "1.0.0",
            "dependencies": { "express": "^4.18.0" }
          }

      /app/server.js:
        mode: "0644"
        noExpand: true
        content: |
          'use strict';
          const express = require('express');
          const http    = require('http');
          const PORT    = +(process.env.PORT         || 3000);
          const MPORT   = +(process.env.METRICS_PORT || 9090);
          const SVC     =   process.env.SERVICE_NAME || 'notes-api';

          const app = express();
          app.use(express.json());

          // ---- in-memory store ----
          let nextId = 2;
          const store = [
            { id: 1, title: 'Welcome', body: 'Your first note.', createdAt: new Date().toISOString() },
          ];

          // ---- routes ----
          app.get('/healthz', (_req, res) => res.json({ status: 'ok',    service: SVC }));
          app.get('/ready',   (_req, res) => res.json({ status: 'ready', service: SVC }));

          app.get('/notes', (_req, res) => res.json({ data: store, total: store.length }));

          app.get('/notes/:id', (req, res) => {
            const note = store.find(n => n.id === +req.params.id);
            return note ? res.json({ data: note }) : res.status(404).json({ error: 'not found' });
          });

          app.post('/notes', (req, res) => {
            const { title, body = '' } = req.body || {};
            if (!title) return res.status(400).json({ error: 'title is required' });
            const note = { id: nextId++, title, body, createdAt: new Date().toISOString() };
            store.push(note);
            res.status(201).json({ data: note });
          });

          app.delete('/notes/:id', (req, res) => {
            const idx = store.findIndex(n => n.id === +req.params.id);
            if (idx === -1) return res.status(404).json({ error: 'not found' });
            store.splice(idx, 1);
            res.status(204).end();
          });

          // ---- Prometheus metrics sidecar ----
          let reqCount = 0;
          app.use((_req, _res, next) => { reqCount++; next(); });

          const metrics = http.createServer((req, res) => {
            if (req.url === '/metrics') {
              res.writeHead(200, { 'Content-Type': 'text/plain' });
              res.end('# HELP http_requests_total Total HTTP requests\n' +
                      'http_requests_total{service="' + SVC + '"} ' + reqCount + '\n');
            } else {
              res.writeHead(404); res.end();
            }
          });

          app.listen(PORT,  () => console.log('[' + SVC + '] API on :' + PORT));
          metrics.listen(MPORT, () => console.log('[' + SVC + '] Metrics on :' + MPORT));

    resources:
      limits:
        memory: 256Mi
        cpu: 500m
      requests:
        memory: 128Mi
        cpu: 250m

    livenessProbe:
      httpGet:
        scheme: http
        path: /healthz
        port: 3000

    readinessProbe:
      httpGet:
        scheme: http
        path: /ready
        port: 3000
        httpHeaders:
          - name: X-Health-Check
            value: "true"

service:
  ports:
    http:
      port: 3000
      protocol: TCP
      targetPort: 3000
    metrics:
      port: 9090
      protocol: TCP
      targetPort: 9090
